model_name: dinovtree
modalities:
  - image

# Backbone
backbone_name: dinov3
backbone_version: dinov3_vitb16

# TaskHeads
use_task_specific_mlp: true
use_shared_mlp: false
use_position_embedding: true
use_shared_query: false
use_shared_attn_weights: false
fusion_method_cls: concat
fusion_method_height: task_token_only
use_sigmoid_for_height: false

# Optimization
batch_size: 64
accumulate_grad_batches: 1
max_epochs: 50
weight_decay: 0
lr_head: 5e-5
lr_reduction_backbone: 2
warmup_epochs: 2
warmup_lr: 2e-08
min_lr: 2e-07

# Loss
weighting_strategy: dwa
cls_loss_name: cross_entropy
cls_weight: 1.0
label_smoothing: 0
beta: 0.9999
gamma: 2.0
height_loss_name: smooth_l1
height_weight: 1.0
